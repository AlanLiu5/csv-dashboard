<html>
    <head>
        <link rel="stylesheet" href="/static/style.css">
        <title>CSV Dashboard</title>
    </head>

    <body>
        <div class="container">
            <div class="card">
                <h1>📊 CSV Dashboard</h1>
                <p>Frontend fetches JSON and draws the chart by itself.</p>
            </div>

            <div class="card">
                <h2>Controls</h2>
                <div class="controls-grid">
                    <div>
                        <label>group_by</label>
                        <input id="group_by" value="{{ group_by }}">
                    </div>

                    <div>
                        <label>metric</label>
                        <select id="metric">
                            <option value="sum" {% if metric == "sum" %}selected{% endif %}>sum</option>
                            <option value="mean" {% if metric == "mean" %}selected{% endif %}>mean</option>
                            <option value="count" {% if metric == "count" %}selected{% endif %}>count</option>
                        </select>
                    </div>

                    <div>
                        <label>field</label>
                        <input id="field" value="{{ field }}">
                    </div>

                    <div>
                        <label>city</label>
                        <input id="city" value="{{ city }}">
                    </div>

                    <div>
                        <label>k</label>
                        <input type="number" id="k" value="{{ k }}">
                    </div>

                    <div class="full">
                        <button type="button" onclick="updateChart()">Update Dashboard</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Parameters</h2>
                <div class="meta" id="params-box">
                    <div><b>group_by:</b> {{ group_by }}</div>
                    <div><b>metric:</b> {{ metric }}</div>
                    <div><b>field:</b> {{ field }}</div>
                    <div><b>city:</b> {{ city }}</div>
                    <div><b>k:</b> {{ k }}</div>
                </div>
                <p id="error"></p>
            </div>

            <div class="card">
                <h2>Results</h2>
                <div class="meta" id="result"></div>
            </div>

            <div class="card">
                <h2>Chart</h2>
                <canvas id="myChart"></canvas>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="/static/app.js"></script>


    </body>
</html>
